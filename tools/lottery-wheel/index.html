<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽籤輪盤 — 班級隨機點名</title>
<style>
  :root {
    --bg: #0d0d0d;
    --bg-soft: #1a1a1a;
    --fg: #f5f5f5;
    --accent: #ff8c42;
    --muted: #666;
    --border: #2a2a2a;
    --used: #3a3a3a;
    --chalk: #f5f5f5;
    --pastel: #ffb3ba,#ffdfba,#ffffba,#baffc9,#bae1ff,#d0baff,#ffbaed,#c9c9ff,#ffd1a3,#a3e4d7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Chalkboard", "Comic Sans MS", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    padding: 20px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 2px 2px 0 #000, 0 0 20px rgba(255,140,66,0.3);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 8px;
  }
  main {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--bg-soft);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .panel h2 {
    margin: 0 0 12px;
    font-size: 1.1rem;
    color: var(--accent);
  }
  textarea {
    width: 100%;
    min-height: 220px;
    background: #000;
    color: var(--chalk);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.6;
    resize: vertical;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,140,66,0.15);
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }
  .checkbox {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    color: var(--fg);
    font-size: 0.95rem;
  }
  .checkbox input { accent-color: var(--accent); transform: scale(1.2); }
  button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,140,66,0.4); }
  button:active { transform: translateY(0); }
  button:disabled { background: var(--used); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
  }
  button.secondary:hover { background: rgba(255,140,66,0.1); }
  .wheel-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .wheel-container {
    position: relative;
    width: min(420px, 90vw);
    height: min(420px, 90vw);
  }
  .pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 32px solid var(--accent);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    z-index: 10;
  }
  svg.wheel {
    width: 100%;
    height: 100%;
    transition: transform 4s cubic-bezier(0.17, 0.67, 0.16, 1);
  }
  .empty-state {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-size: 1.1rem;
  }
  #result {
    min-height: 80px;
    text-align: center;
    padding: 20px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,140,66,0.15), rgba(255,140,66,0.05));
    border: 2px dashed var(--accent);
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: bold;
    color: var(--accent);
    text-shadow: 2px 2px 0 #000;
    width: min(420px, 90vw);
    transition: transform .3s;
  }
  #result.pop { animation: pop 0.6s ease-out; }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .stat {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 0.9rem;
    width: min(420px, 90vw);
  }
  footer {
    text-align: center;
    margin-top: 32px;
    color: var(--muted);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <h1>🎯 抽籤輪盤</h1>
  <div class="subtitle">班級隨機點名 / 抽組別 — 黑板粉筆風</div>
</header>

<main>
  <section class="panel">
    <h2>📝 名單(每行一個)</h2>
    <textarea id="nameInput" placeholder="01 王小明
02 陳小華
03 林大同
04 黃小芳
05 張曉雯
06 李志強
07 吳建宏
08 蔡美玲"></textarea>
    <div class="controls">
      <label class="checkbox">
        <input type="checkbox" id="excludeUsed" checked>
        排除已抽過
      </label>
    </div>
    <div class="controls" style="margin-top: 16px;">
      <button id="spinBtn">🎲 開始抽</button>
      <button id="resetBtn" class="secondary">🔄 重置</button>
    </div>
  </section>

  <section class="panel">
    <h2>🎡 轉盤</h2>
    <div class="wheel-wrap">
      <div class="wheel-container">
        <div class="pointer"></div>
        <svg class="wheel" id="wheel" viewBox="0 0 400 400">
          <text x="200" y="210" text-anchor="middle" fill="#666" font-size="18">請輸入名單</text>
        </svg>
      </div>
      <div id="result">準備開始 🎬</div>
      <div class="stat">
        <span id="stat-total">總人數: 0</span>
        <span id="stat-used">已抽: 0</span>
        <span id="stat-remain">剩餘: 0</span>
      </div>
    </div>
  </section>
</main>

<footer>
  © my-classroom-tools · 抽籤輪盤 · 老師建專案工作模式
</footer>

<script>
(function(){
  const PASTEL = ['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff','#d0baff','#ffbaed','#c9c9ff','#ffd1a3','#a3e4d7'];
  const nameInput = document.getElementById('nameInput');
  const wheel = document.getElementById('wheel');
  const spinBtn = document.getElementById('spinBtn');
  const resetBtn = document.getElementById('resetBtn');
  const excludeUsed = document.getElementById('excludeUsed');
  const result = document.getElementById('result');
  const statTotal = document.getElementById('stat-total');
  const statUsed = document.getElementById('stat-used');
  const statRemain = document.getElementById('stat-remain');

  let used = new Set();
  let currentRotation = 0;
  let spinning = false;

  function getAllNames(){
    return nameInput.value.split('\n').map(s=>s.trim()).filter(Boolean);
  }
  function getActiveNames(){
    const all = getAllNames();
    if (!excludeUsed.checked) return all;
    return all.filter(n => !used.has(n));
  }

  function polarToCart(cx, cy, r, angleDeg){
    const a = (angleDeg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }
  function arcPath(cx, cy, r, startDeg, endDeg){
    const [sx, sy] = polarToCart(cx, cy, r, endDeg);
    const [ex, ey] = polarToCart(cx, cy, r, startDeg);
    const largeArc = (endDeg - startDeg) <= 180 ? 0 : 1;
    return `M ${cx} ${cy} L ${sx} ${sy} A ${r} ${r} 0 ${largeArc} 0 ${ex} ${ey} Z`;
  }

  function renderWheel(){
    const all = getAllNames();
    statTotal.textContent = `總人數: ${all.length}`;
    statUsed.textContent = `已抽: ${[...used].filter(u => all.includes(u)).length}`;
    statRemain.textContent = `剩餘: ${getActiveNames().length}`;

    if (all.length === 0){
      wheel.innerHTML = '<text x="200" y="210" text-anchor="middle" fill="#666" font-size="18">請輸入名單</text>';
      return;
    }

    const cx = 200, cy = 200, r = 180;
    const slice = 360 / all.length;
    let html = '';
    all.forEach((name, i) => {
      const start = i * slice;
      const end = (i + 1) * slice;
      const isUsed = used.has(name);
      const fill = isUsed ? '#3a3a3a' : PASTEL[i % PASTEL.length];
      const op = isUsed ? '0.4' : '1';
      html += `<path d="${arcPath(cx, cy, r, start, end)}" fill="${fill}" fill-opacity="${op}" stroke="#000" stroke-width="2"/>`;
      const midAngle = start + slice / 2;
      const textR = r * 0.62;
      const [tx, ty] = polarToCart(cx, cy, textR, midAngle);
      const rotate = midAngle;
      const fontSize = Math.max(10, Math.min(18, 200 / all.length + 8));
      html += `<text x="${tx}" y="${ty}" fill="#000" font-size="${fontSize}" font-weight="bold" text-anchor="middle" dominant-baseline="middle" transform="rotate(${rotate}, ${tx}, ${ty})" style="opacity:${isUsed?0.5:1}">${escapeHtml(name)}</text>`;
    });
    html += `<circle cx="${cx}" cy="${cy}" r="20" fill="#0d0d0d" stroke="#ff8c42" stroke-width="3"/>`;
    wheel.innerHTML = html;
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function spin(){
    if (spinning) return;
    const active = getActiveNames();
    const all = getAllNames();
    if (all.length === 0){
      result.textContent = '⚠️ 請先輸入名單';
      result.classList.remove('pop'); void result.offsetWidth; result.classList.add('pop');
      return;
    }
    if (active.length === 0){
      result.textContent = '🎊 全班都抽過!按「重置」可重來';
      result.classList.remove('pop'); void result.offsetWidth; result.classList.add('pop');
      return;
    }

    spinning = true;
    spinBtn.disabled = true;
    result.textContent = '轉動中... 🌀';
    result.classList.remove('pop');

    // 隨機挑一個活躍對象
    const winnerName = active[Math.floor(Math.random() * active.length)];
    const winnerIndex = all.indexOf(winnerName);
    const slice = 360 / all.length;
    // 指針在 12 點位置(0 度),扇形 i 在 [i*slice, (i+1)*slice]
    // 要讓 winner 的中點 (winnerIndex*slice + slice/2) 轉到指針位置 = 0(視覺上)
    // 圖案旋轉角:讓 winnerMid 跑到 0 → rotate = -winnerMid + 360*圈數
    const winnerMid = winnerIndex * slice + slice / 2;
    const turns = 5 + Math.floor(Math.random() * 3); // 5~7 圈
    const targetRot = currentRotation + (360 * turns) + (360 - winnerMid - (Math.random()-0.5) * slice * 0.5);
    currentRotation = targetRot;
    wheel.style.transform = `rotate(${targetRot}deg)`;

    setTimeout(() => {
      used.add(winnerName);
      result.textContent = `🎯 ${winnerName}`;
      result.classList.remove('pop'); void result.offsetWidth; result.classList.add('pop');
      renderWheel();
      spinning = false;
      spinBtn.disabled = false;
    }, 4100);
  }

  function reset(){
    used.clear();
    result.textContent = '已重置 🔄';
    result.classList.remove('pop'); void result.offsetWidth; result.classList.add('pop');
    renderWheel();
  }

  nameInput.addEventListener('input', renderWheel);
  excludeUsed.addEventListener('change', renderWheel);
  spinBtn.addEventListener('click', spin);
  resetBtn.addEventListener('click', reset);

  renderWheel();
})();
</script>

</body>
</html>
