<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的班級工具總覽 — my-classroom-tools</title>
<style>
  :root {
    --bg: #0d0d0d;
    --bg-soft: #1a1a1a;
    --fg: #f5f5f5;
    --accent: #ff8c42;
    --muted: #888;
    --border: #2a2a2a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Chalkboard", "Comic Sans MS", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    padding: 32px 20px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  h1 {
    margin: 0;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--accent);
    letter-spacing: 0.08em;
    text-shadow: 2px 2px 0 #000, 0 0 24px rgba(255,140,66,0.3);
  }
  .subtitle {
    color: var(--muted);
    margin-top: 12px;
    font-size: 1rem;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
  }
  .tools {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .tool-card {
    background: var(--bg-soft);
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 24px;
    text-decoration: none;
    color: var(--fg);
    transition: transform .15s, border-color .15s, box-shadow .15s;
    display: block;
  }
  .tool-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(255,140,66,0.2);
  }
  .tool-emoji {
    font-size: 2.4rem;
    margin-bottom: 8px;
  }
  .tool-name {
    color: var(--accent);
    font-size: 1.25rem;
    font-weight: bold;
    margin: 0 0 6px;
  }
  .tool-desc {
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.5;
    margin: 0;
  }
  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>🏫 我的班級工具</h1>
  <div class="subtitle">my-classroom-tools · 黑板粉筆風 · RWD 響應式</div>
</header>

<main>
  <div class="tools">
    <a class="tool-card" href="tools/lottery-wheel/">
      <div class="tool-emoji">🎯</div>
      <h2 class="tool-name">抽籤輪盤</h2>
      <p class="tool-desc">班級隨機點名 / 抽組別。圓形轉盤、可排除已抽過。</p>
    </a>
    <!-- 之後加新工具,複製一張卡片改連結就好 -->
  </div>
</main>

<footer>
  <a href="https://github.com/shunshun70218-ctrl/my-classroom-tools">📦 GitHub repo</a>
</footer>

</body>
</html>
